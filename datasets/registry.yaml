# ===========================================================================
# Dataset registry — the single source of truth for every dataset we plan to use.
#
# POSTURE (set 2026-05-31): research-first / maximize-quality. We use all available
# public data in the `research` lane to find the quality ceiling, and decide
# research-publication vs. commercialization later. Licenses + lanes are still
# tracked (cheaply) so that later decision is a lookup, not an archaeology project.
# `python -m datasets.audit` still fails loudly if anything in the COMMERCIAL lane
# traces to a non-permissive source.
#
# Fields (see datasets.registry.DatasetRecord):
#   name, source_url, paper_url, size, modality, content_types,
#   annotation_format, tasks, has_preparer, license_provenance, data_lane,
#   verified, notes
#   modality:           vector | raster | point_cloud | mixed | synthetic | text
#   license_provenance: see cir.enums.LicenseProvenance (CC0, CC-BY, CC-BY-NC, ...)
#   data_lane:          research | commercial
# ===========================================================================
datasets:
  # ------------------------------------------------------------------ MEP / P&ID
  - name: PIDQA
    source_url: https://github.com/mgupta70/PIDQA
    paper_url: https://www.mdpi.com/2504-4990/7/2/39
    size: 64,000 QA pairs over 500 P&ID sheets
    modality: text
    content_types: [pid, qa, graph]
    annotation_format: csv-qa
    tasks: [qa, graph]
    has_preparer: true
    license_provenance: CC0
    data_lane: research
    verified: true
    notes: >
      CC0. Graph-grounded QA (counting / spatial counting / spatial connections /
      value) with a Cypher query per question; 4 CSVs keyed by P&ID_number. Underlying
      P&ID images come from Dataset-P&ID. PREPARER IMPLEMENTED (one CIR DrawingSet per
      sheet, QA pairs in metadata).

  - name: DELP-SkeySpot
    source_url: https://github.com/HAIx-Lab/Skeyspot
    paper_url: https://arxiv.org/abs/2508.10449
    size: 45 plans, 2,450 instances, 34 service-key classes
    modality: raster
    content_types: [electrical, mep, symbols]
    annotation_format: voc-xml
    tasks: [detection]
    has_preparer: true
    license_provenance: CC-BY
    data_lane: research
    verified: true
    notes: >
      CC-BY-4.0. Electrical service-key detection (UK housing). The full annotated
      45-image dataset is GATED ("available for academic research upon request to the
      authors"); the public repo ships the YOLOv8 toolkit + weights, a sample image,
      and per-plot detection-summary CSVs. PREPARER IMPLEMENTED: converts the public
      detection summaries now, and Pascal-VOC (LabelImg) annotations once the full set
      is obtained.

  - name: Dataset-P&ID
    source_url: https://drive.google.com/drive/folders/1gMm_YKBZtXB3qUKUpI-LF1HE_MgzwfeR
    paper_url: https://arxiv.org/pdf/2109.03794
    size: 500 synthetic sheets, 32 symbol templates
    modality: synthetic
    content_types: [pid, symbols, graph]
    annotation_format: custom-json
    tasks: [detection, graph]
    has_preparer: false
    license_provenance: research-only
    data_lane: research
    verified: false
    notes: Synthetic P&ID benchmark (Google Drive). Provides the symbol boxes + graph that PIDQA queries.

  - name: PID2Graph
    source_url: https://zenodo.org/records/14803338
    paper_url: https://arxiv.org/abs/2411.13929
    size: 36,561 GraphML (real OPEN100 + Dataset-P&ID + synthetic); 2,391 CIR converted (A7)
    modality: raster
    content_types: [pid, symbols, connectivity, graph, real]
    annotation_format: graphml
    tasks: [detection, graph]
    has_preparer: true
    license_provenance: CC-BY-SA
    data_lane: research
    verified: true
    notes: >
      Real OPEN100 + synthetic P&IDs with full graph GT (typed nodes + undirected edges).
      Converted to CIR by datasets.preparers.graphml_cir (directed=False per ADR-0012;
      connector/crossing/arrow -> GRAPH_NODE + node_role; pixel bbox -> normalized by the
      paired image). Slices recorded in each doc's metadata (complete/patched x
      dataset-pid/open100/synthetic + a real flag); the OPEN100-real slice is the P&ID
      connectivity eval (published SOTA 75.5 edge mAP / 88.9 synthetic, arXiv 2411.13929).
  - name: CGHD
    source_url: https://zenodo.org/records/15333233
    size: handwritten circuit diagrams w/ symbols + junctions + wire-hops (graph GT)
    modality: raster
    content_types: [electrical, circuits, symbols, connectivity, graph, real]
    annotation_format: voc-xml
    tasks: [detection, graph]
    has_preparer: false
    license_provenance: CC-BY
    data_lane: research
    verified: true
    notes: >
      CC BY 4.0. DEFERRED: the Zenodo cghd-zenodo-15.zip download is TRUNCATED (2.49 of
      4.87 GB) — fetch_datasets.py's url_zip path needs a resumable/streamed download for
      multi-GB files. Re-fetch, then a CGHD->CIR converter (junctions -> GRAPH_NODE,
      wires -> Connection directed=False) reuses the ADR-0012 graph model.

  - name: SynthPID
    source_url: https://github.com/
    size: 665 topology-preserving synthetic P&IDs
    modality: synthetic
    content_types: [pid, symbols, graph]
    annotation_format: custom-json
    tasks: [detection, graph]
    has_preparer: false
    license_provenance: research-only
    data_lane: research
    verified: false
    notes: Synthetic P&IDs; proof that synth-only training nears a real-data oracle (~8pt edge-mAP gap).

