  # ---------------------- Real electrical (Roboflow Universe) --------------------
  # Downloaded via datasets.preparers.yolo_generic (ROBOFLOW_ELECTRICAL) + YOLO->CIR.
  # Licenses are uploader-SELF-DECLARED CC-BY on drawings likely not owned by the uploader
  # -> RESEARCH lane only (commercial only after provenance diligence). role=eval sets are
  # held out (never trained on) and feed the REAL electrical scoreboard.
  - name: roboflow-delp
    source_url: https://universe.roboflow.com/iitgn-motpy/delp
    paper_url: https://arxiv.org/abs/2508.10449
    size: 403 annotated crops from 45 real UK electrical layout plans, 34 classes
    modality: raster
