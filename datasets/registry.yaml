    annotation_format: yolo-txt
    tasks: [detection]
    has_preparer: true
    license_provenance: CC-BY
    data_lane: research
    verified: true
    notes: >
      DELP/SkeySpot (IIT Gandhinagar) — THE real electrical benchmark, previously
      request-only, now on Roboflow. role=EVAL: held out as the real-drawing scoreboard
      (datasets/real/electrical/roboflow__delp/); never trained on. Class names differ from
      our detector vocabulary — label mapping is a sim-to-real step.
